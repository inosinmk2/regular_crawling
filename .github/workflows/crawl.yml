name: Crawl UT Austin Physics News

on:
  schedule:
    - cron: '0 9 * * *'   # 毎日 UTC 9:00（日本時間 18:00）
  workflow_dispatch:        # 手動実行ボタン

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedgen

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml last_items.json
          git diff --staged --quiet || git commit -m "Update feed $(date '+%Y-%m-%d %H:%M UTC')"
          git push